<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RTS Netcode Prototype v2.1</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        canvas { background: #222; border: 2px solid #555; margin-top: 10px; }
        #ui { padding: 10px; background: #333; display: flex; justify-content: center; gap: 10px; align-items: center; }
        button { padding: 8px 15px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px;}
        button:hover { opacity: 0.8; }
        
        .screen { display: none; margin-top: 50px; }
        #lobby.active, #waitingRoom.active, #gameUI.active { display: block; }
        input { padding: 8px; font-size: 16px; width: 150px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lobby" class="screen active">
        <h2>RTS MULTIPLAYER TEST</h2>
        <h3 style="color: #ffff00; margin-top: -10px;">[ PHIÊN BẢN v2.1 ]</h3>
        <p id="serverStatus" style="color: #ff4444; font-weight: bold;">Trạng thái: Đang kết nối Server...</p>
        
        <br>
        <button id="btnCreate" onclick="createRoom()" style="background: #00ffff; color: #000; font-size: 16px; display: none;">TẠO PHÒNG (HOST)</button>
        <br><br><br>
        <div style="border-top: 1px solid #444; padding-top: 20px; width: 300px; margin: 0 auto;">
            <input type="text" id="roomCode" placeholder="Nhập mã...">
            <button id="btnJoin" onclick="joinRoom()" style="background: #555; color: #fff; display: none;">THAM GIA (GUEST)</button>
        </div>
    </div>

    <div id="waitingRoom" class="screen">
        <h3 style="color: #ffff00; margin-top: 0;">[ PHIÊN BẢN v2.1 ]</h3>
        <h2>PHÒNG CHỜ CHIẾN DỊCH</h2>
        <h1 id="roomCodeDisplay" style="color: #00ffff; letter-spacing: 2px; font-size: 36px;">MÃ: ----</h1>
        <p id="playerCountDisplay" style="font-size: 18px; color: #ffd700;">Số người tham gia: 1 / 3</p>
        
        <br>
        <button id="btnStart" onclick="hostStartGame()" style="display:none; background: #0a0; color: white; font-size: 18px; padding: 12px 24px;">BẮT ĐẦU GAME</button>
        <p id="guestWaitMsg" style="display:none; color: #aaa; font-style: italic;">Đang chờ chủ phòng bắt đầu...</p>
    </div>

    <div id="gameUI" class="screen" style="margin-top: 0;">
        <div id="ui">
            <span id="goldDisplay" style="color: gold; font-size: 20px; line-height: 35px; width: 150px; text-align: left;">Vàng: 100</span>
            <button onclick="sendAction('BUY_MINER')" style="background: #aa0; color: #000;">Mua Xe (50v)</button>
            <button onclick="sendAction('BUY_UNIT')" style="background: #a00; color: #fff;">Mua Lính (30v)</button>
            <button onclick="sendAction('ATTACK')" style="background: #0aa; color: #fff;">Tấn Công</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let myRole = '';
        let myTeam = 0;
        let myRoom = '';
        let gameLoopId;
        let syncInterval; 

        // --- Kiểm tra kết nối mạng ---
        socket.on('connect', () => {
            console.log("Đã kết nối được với Server Node.js!");
            document.getElementById('serverStatus').innerText = "Trạng thái: Đã kết nối Server!";
            document.getElementById('serverStatus').style.color = "#00ff00";
            // Chỉ hiện nút Tạo/Tham gia khi đã kết nối thành công
            document.getElementById('btnCreate').style.display = 'inline-block';
            document.getElementById('btnJoin').style.display = 'inline-block';
        });

        // --- CẤU TRÚC DỮ LIỆU GAME (STATE) ---
        let state = {
            isPlaying: false, 
            playerCount: 1,  
            gold: { 1: 100, 2: 100, 3: 100 },
            bases: {
                1: { x: 100, y: 100, hp: 1000, color: '#00ffff' },
                2: { x: 700, y: 500, hp: 1000, color: '#ff3333' },
                3: { x: 700, y: 100, hp: 1000, color: '#33ff33' }
            },
            miners: [],
            units: []
        };

        const GOLD_MINE = { x: 400, y: 300, radius: 40 }; 
        let aiBots = { 2: 'RUSH', 3: 'LATE' }; 

        // --- ĐIỀU HƯỚNG MÀN HÌNH ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- MẠNG LƯỚI (NETWORK) ---
        function createRoom() { 
            console.log("Bấm nút tạo phòng...");
            socket.emit('createRoom'); 
        }

        function joinRoom() { 
            let code = document.getElementById('roomCode').value.toUpperCase().trim();
            if(code) {
                console.log("Bấm nút tham gia mã:", code);
                socket.emit('joinRoom', code); 
            }
        }

        socket.on('init', (data) => {
            console.log("Nhận được lệnh khởi tạo phòng:", data);
            myRole = data.role; myTeam = data.team; myRoom = data.roomCode;
            
            showScreen('waitingRoom');
            document.getElementById('roomCodeDisplay').innerText = `MÃ: ${myRoom}`;

            if (myRole === 'host') {
                document.getElementById('btnStart').style.display = 'inline-block';
                syncInterval = setInterval(() => {
                    socket.emit('syncState', { roomCode: myRoom, state: state });
                }, 500);
            } else {
                document.getElementById('guestWaitMsg').style.display = 'block';
            }
        });

        socket.on('playerJoined', (teamId) => {
            console.log("Có người chơi mới vào slot Đội", teamId);
            delete aiBots[teamId]; 
            state.playerCount++;
            document.getElementById('playerCountDisplay').innerText = `Số người tham gia: ${state.playerCount} / 3`;
        });

        socket.on('updateState', (newState) => {
            if (myRole === 'guest') {
                state = newState;
                document.getElementById('playerCountDisplay').innerText = `Số người tham gia: ${state.playerCount} / 3`;
                
                if (state.isPlaying && !gameLoopId) {
                    enterGameScreen();
                }
            }
        });

        socket.on('receiveAction', (data) => {
            if (myRole === 'host') executeAction(data.action, data.team);
        });

        // --- LUỒNG BẮT ĐẦU GAME ---
        function hostStartGame() {
            console.log("Host bấm Bắt đầu game!");
            state.isPlaying = true;
            clearInterval(syncInterval);
            socket.emit('syncState', { roomCode: myRoom, state: state });
            enterGameScreen();
        }

        function enterGameScreen() {
            showScreen('gameUI');
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- XỬ LÝ LỆNH (ACTION) ---
        function sendAction(actionType) {
            if (myRole === 'guest') socket.emit('sendAction', { roomCode: myRoom, action: actionType, team: myTeam });
            else executeAction(actionType, myTeam);
        }

        function executeAction(action, team) {
            let base = state.bases[team];
            if (!base || base.hp <= 0) return;

            if (action === 'BUY_MINER' && state.gold[team] >= 50) {
                state.gold[team] -= 50;
                state.miners.push({ x: base.x, y: base.y, team: team, status: 'to_mine' });
            }
            if (action === 'BUY_UNIT' && state.gold[team] >= 30) {
                state.gold[team] -= 30;
                state.units.push({ x: base.x + 30, y: base.y + 30, team: team, status: 'idle' });
            }
            if (action === 'ATTACK') {
                state.units.filter(u => u.team === team).forEach(u => u.status = 'attacking');
            }
        }

        // --- VÒNG LẶP GAME & LOGIC ---
        let frameTick = 0;
        function gameLoop() {
            if (myRole === 'host') {
                frameTick++;
                updateLogic();
                if (frameTick % 60 === 0) runAI(); 
                socket.emit('syncState', { roomCode: myRoom, state: state });
            }
            
            drawCanvas();
            document.getElementById('goldDisplay').innerText = `Vàng: ${Math.floor(state.gold[myTeam])}`;
            requestAnimationFrame(gameLoop);
        }

        function updateLogic() {
            state.miners.forEach(m => {
                let target = m.status === 'to_mine' ? GOLD_MINE : state.bases[m.team];
                if (!target) return;
                
                let dx = target.x - m.x; let dy = target.y - m.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 10) {
                    m.x += (dx / dist) * 2; m.y += (dy / dist) * 2;
                } else {
                    if (m.status === 'to_mine') m.status = 'to_base';
                    else { m.status = 'to_mine'; state.gold[m.team] += 10; }
                }
            });

            state.units.forEach(u => {
                if (u.status !== 'attacking') return;
                let enemyTeam = Object.keys(state.bases).find(t => t != u.team && state.bases[t].hp > 0);
                if (!enemyTeam) { u.status = 'idle'; return; }

                let target = state.bases[enemyTeam];
                let dx = target.x - u.x; let dy = target.y - u.y;
                let dist = Math.hypot(dx, dy);
                
                if (dist > 30) {
                    u.x += (dx / dist) * 1.5; u.y += (dy / dist) * 1.5;
                } else { target.hp -= 0.5; u.hp = 0; }
            });

            state.units = state.units.filter(u => u.hp !== 0);
        }

        function runAI() {
            Object.keys(aiBots).forEach(team => {
                let t = parseInt(team);
                if (state.bases[t].hp <= 0) return;
                
                let style = aiBots[t];
                let teamUnits = state.units.filter(u => u.team === t).length;
                let teamMiners = state.miners.filter(m => m.team === t).length;

                if (style === 'RUSH') {
                    if (state.gold[t] >= 30) executeAction('BUY_UNIT', t);
                    if (teamUnits >= 3) executeAction('ATTACK', t);
                } else if (style === 'LATE') {
                    if (teamMiners < 5 && state.gold[t] >= 50) executeAction('BUY_MINER', t);
                    else if (teamMiners >= 5 && state.gold[t] >= 30) executeAction('BUY_UNIT', t);
                    if (teamUnits >= 10) executeAction('ATTACK', t); 
                }
            });
        }

        // --- ĐỒ HỌA ---
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
            ctx.beginPath(); ctx.arc(GOLD_MINE.x, GOLD_MINE.y, GOLD_MINE.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.fillText("MỎ VÀNG", GOLD_MINE.x - 25, GOLD_MINE.y + 5);

            Object.keys(state.bases).forEach(team => {
                let b = state.bases[team];
                if (b.hp <= 0) return;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - 25, b.y - 25, 50, 50);
                
                ctx.fillStyle = "red"; ctx.fillRect(b.x - 25, b.y - 35, 50, 5);
                ctx.fillStyle = "green"; ctx.fillRect(b.x - 25, b.y - 35, 50 * (b.hp/1000), 5);
                
                if (parseInt(team) === myTeam) {
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2;
                    ctx.strokeRect(b.x - 28, b.y - 28, 56, 56);
                }
            });

            state.miners.forEach(m => {
                ctx.fillStyle = state.bases[m.team].color;
                ctx.beginPath(); ctx.arc(m.x, m.y, 8, 0, Math.PI*2); ctx.fill();
            });

            state.units.forEach(u => {
                ctx.fillStyle = state.bases[u.team].color;
                ctx.fillRect(u.x - 5, u.y - 5, 10, 10);
            });
        }
    </script>
</body>
</html>
