<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RTS v0.1.5</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
</style>
    </head>
<body>
    <div id="ui-layer" style="position: absolute; z-index: 10;">
        <div id="screen-login">
            <input type="text" id="username" placeholder="Tên của bạn">
            <button onclick="handleCreate()">TẠO PHÒNG (HOST)</button>
            <input type="text" id="joinCode" placeholder="MÃ PHÒNG">
            <button onclick="handleJoin()">THAM GIA (GUEST)</button>
        </div>
        
        <div id="screen-waiting" style="display:none;">
            <h1 id="display-code" style="color: cyan;">----</h1>
            <ul id="player-list"></ul>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="network.js"></script>
    <script src="game.js"></script>
    <script>
    let currentRoomCode = '';

    // 1. Khi nhận được tín hiệu khởi tạo phòng (Tạo hoặc Join thành công)
    Network.onInit((data) => {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-waiting').style.display = 'block';
        
        currentRoomCode = data.roomCode;
        document.getElementById('display-code').innerText = "MÃ PHÒNG: " + data.roomCode;

        // Nếu là Host, hiển thị nút Bắt đầu
        if (data.role === 'host') {
            document.getElementById('btn-start').style.display = 'block';
        }
        
        renderPlayers(data.players);
    });

    // 2. Cập nhật danh sách khi có người mới vào
    Network.onRoomUpdate((players) => {
        renderPlayers(players);
    });

    // 3. Hàm render danh sách vào UI
    function renderPlayers(players) {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `<li>👤 ${p.name} ${p.id === socket.id ? '(Bạn)' : ''}</li>`).join('');
    }

    // 4. Hàm bấm Bắt đầu (gọi từ nút bấm trong HTML)
    function handleStart() {
        Network.startGame(currentRoomCode);
    }
</script>

<div id="screen-waiting" style="display:none;">
    <h2 id="display-code"></h2>
    <ul id="player-list"></ul>
    <button id="btn-start" style="display:none;" onclick="handleStart()">BẮT ĐẦU TRÒ CHƠI</button>
</div>
</body>
</html>
