<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTS v0.1.4</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* RESET CSS - CẮT BỎ MỌI VIỀN THỪA */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
            font-family: sans-serif; color: #fff;
        }
        
        /* BẢN ĐỒ FULL MÀN HÌNH CHÌM XUỐNG DƯỚI */
        canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 1; display: block; 
        }

        /* GIAO DIỆN NỔI LÊN TRÊN */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
        }
        
        .screen { display: none; width: 100%; height: 100%; pointer-events: auto; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .panel { background: rgba(20, 20, 30, 0.95); border: 2px solid #0ff; padding: 20px; border-radius: 8px; width: 320px; text-align: center; }
        
        input, button { width: 100%; margin-bottom: 10px; padding: 10px; font-weight: bold; border-radius: 4px; border: none; }
        input { background: #111; color: #fff; border: 1px solid #0ff; text-align: center; }
        button { cursor: pointer; background: #555; color: #fff; }
        .btn-primary { background: #0ff; color: #000; }
        .btn-success { background: #0a0; color: #fff; font-size: 18px; }

        /* THANH TOP BAR TRONG GAME */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,10,0.8);
            border-bottom: 1px solid #0ff; display: flex; justify-content: center; gap: 15px;
            padding: 8px 0; font-size: 14px; font-weight: bold; pointer-events: auto;
        }

        #system-msg { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: #0a0; padding: 5px 15px; border-radius: 20px; display: none; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 5px; border-bottom: 1px dashed #444; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        
        <div id="system-msg">...</div>

        <div id="top-bar" style="display: none;">
            <span style="color: gold;">Vàng: 100</span>
            <span style="color: #0ff;">P1: ⚔️0</span>
            <span style="color: #f33;">P2: ⚔️0</span>
            <span style="color: #3f3;">P3: ⚔️0</span>
        </div>

        <div id="screen-login" class="screen active">
            <div class="panel">
                <h2 style="color: #0ff; margin-top: 0;">RTS v0.1.4</h2>
                <p id="connect-status" style="color: #f33;">Đang kết nối Server...</p>
                
                <input type="text" id="username" placeholder="Tên hiển thị (VD: Hiếu)">
                <hr style="border-color: #333; margin: 15px 0;">
                
                <div id="action-zone" style="display:none;">
                    <button class="btn-primary" onclick="createRoom()">TẠO PHÒNG (HOST)</button>
                    <input type="text" id="roomCode" placeholder="MÃ PHÒNG (NẾU CÓ)" style="margin-top: 15px; text-transform: uppercase;">
                    <button onclick="joinRoom()">THAM GIA (GUEST)</button>
                </div>
            </div>
        </div>

        <div id="screen-waiting" class="screen">
            <div class="panel">
                <h3 style="color: #888; margin:0;">MÃ PHÒNG CỦA BẠN</h3>
                <h1 id="display-code" style="color: #0ff; letter-spacing: 3px; font-size: 36px; margin: 5px 0 15px;">----</h1>
                <ul id="player-list"></ul>
                <button id="btn-start" class="btn-success" style="display:none;" onclick="startGame()">BẮT ĐẦU VÀO GAME</button>
                <p id="guest-msg" style="display:none; color: #888;">Đang đợi Host bấm bắt đầu...</p>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let dpr = window.devicePixelRatio || 1;
        function resizeCanvas() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let myRole = ''; let myRoom = '';

        // --- KẾT NỐI VÀ CHUYỂN MÀN HÌNH ---
        socket.on('connect', () => {
            document.getElementById('connect-status').innerText = "Đã kết nối Server!";
            document.getElementById('connect-status').style.color = "#0f0";
            document.getElementById('action-zone').style.display = "block";
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        function toast(msg) {
            let el = document.getElementById('system-msg');
            el.innerText = msg; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // --- GỬI LỆNH LÊN SERVER ---
        function createRoom() {
            let name = document.getElementById('username').value.trim() || 'Host';
            socket.emit('createRoom', name);
        }

        function joinRoom() {
            let name = document.getElementById('username').value.trim() || 'Guest';
            let code = document.getElementById('roomCode').value.trim().toUpperCase();
            if(code) socket.emit('joinRoom', { code, username: name });
        }

        function startGame() { socket.emit('startGame', myRoom); }

        // --- NHẬN LỆNH TỪ SERVER ---
        socket.on('init', (data) => {
            myRole = data.role; myRoom = data.roomCode;
            document.getElementById('display-code').innerText = myRoom;
            showScreen('screen-waiting');

            if(myRole === 'host') document.getElementById('btn-start').style.display = 'block';
            else document.getElementById('guest-msg').style.display = 'block';
            
            updateList(data.players);
        });

        socket.on('roomUpdated', (players) => updateList(players));
        socket.on('systemMsg', (msg) => toast(msg));

        socket.on('gameStarted', () => {
            showScreen(null); // Tắt mọi UI
            document.getElementById('top-bar').style.display = 'flex'; // Mở thanh Top Bar
            requestAnimationFrame(gameLoop); // Bật đồ họa
        });

        function updateList(players) {
            let html = '';
            players.forEach(p => html += `<li>[Đội ${p.team}] ${p.name}</li>`);
            document.getElementById('player-list').innerHTML = html;
        }

        // --- ĐỒ HỌA GAME TRỐNG (CƠ BẢN) ---
        let cam = { x: 3000, y: 3000, zoom: 0.5 };
        const stars = [];
        for(let i=0; i<1500; i++) stars.push({ x: Math.random()*6000, y: Math.random()*6000, size: Math.random()*2, alpha: Math.random() });

        function gameLoop() {
            ctx.fillStyle = "#030308"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(window.innerWidth/2, window.innerHeight/2);
            ctx.scale(cam.zoom, cam.zoom); ctx.translate(-cam.x, -cam.y);

            // Vẽ map (Lùi nhẹ 5px để kiểm tra viền)
            ctx.strokeStyle = "rgba(0, 255, 255, 0.2)"; ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, 5990, 5990);

            ctx.fillStyle = "white";
            let vX = cam.x - (window.innerWidth/2 / cam.zoom); let vY = cam.y - (window.innerHeight/2 / cam.zoom);
            let vW = window.innerWidth / cam.zoom; let vH = window.innerHeight / cam.zoom;

            stars.forEach(s => {
                if (s.x >= vX && s.x <= vX + vW && s.y >= vY && s.y <= vY + vH) {
                    s.alpha += (Math.random() - 0.5) * 0.05;
                    if(s.alpha < 0.2) s.alpha = 0.2; if(s.alpha > 1) s.alpha = 1;
                    ctx.globalAlpha = s.alpha; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                }
            });

            ctx.restore();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
