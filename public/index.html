<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sci-Fi RTS Multiplayer</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
            touch-action: none; user-select: none; -webkit-user-select: none;
            font-family: sans-serif;
        }
        
        /* Đưa Canvas chìm xuống dưới cùng, phủ kín 100% màn hình */
        canvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; 
        }

        /* Lớp UI nổi lên trên */
        #ui-container { position: relative; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        /* Top Bar hiển thị Stats */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 0, 15, 0.9);
            border-bottom: 1px solid #00ffff; display: flex; justify-content: center; gap: 20px;
            padding: 8px 0; font-size: 14px; font-weight: bold; pointer-events: auto; display: none;
        }
        .stat-item { padding: 0 10px; border-right: 1px solid #444; }
        .stat-item:last-child { border-right: none; }

        /* Màn hình sảnh chờ */
        #lobby-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95); border: 2px solid #00ffff; padding: 30px;
            border-radius: 8px; text-align: center; pointer-events: auto; width: 320px;
        }
        input, button { 
            width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; 
            font-weight: bold; font-size: 16px; border-radius: 4px; border: none; outline: none;
        }
        input { background: #222; color: #fff; border: 1px solid #555; text-align: center; }
        button { cursor: pointer; }
        button:active { transform: scale(0.98); }

        /* Thông báo hệ thống */
        #system-toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 255, 0, 0.2); color: #00ff00; border: 1px solid #00ff00;
            padding: 8px 20px; border-radius: 20px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-container">
        
        <div id="top-bar">
            <div class="stat-item" style="color: #ffd700;" id="stat-gold">Vàng: 100</div>
            <div class="stat-item" style="color: #00ffff;" id="stat-p1">Player: ⚔️0</div>
            <div class="stat-item" style="color: #ff3333;" id="stat-p2">Bot/P2: ⚔️0</div>
            <div class="stat-item" style="color: #33ff33;" id="stat-p3">Bot/P3: ⚔️0</div>
        </div>

        <div id="system-toast">...</div>

        <div id="lobby-screen">
            <h2 style="color: #00ffff; margin-top: 0;">RTS COMMAND</h2>
            <input type="text" id="username" placeholder="Tên của bạn (VD: Hiếu)" maxlength="12">
            
            <div style="border-bottom: 1px solid #444; margin: 20px 0;"></div>
            
            <button onclick="createHost()" style="background: #00ffff; color: #000;">TẠO PHÒNG MỚI</button>
            <p style="color: #888; font-size: 12px; margin: -5px 0 15px;">(Mã phòng sẽ tạo tự động)</p>
            
            <div style="border-bottom: 1px solid #444; margin: 20px 0;"></div>

            <input type="text" id="joinCode" placeholder="Nhập mã phòng..." style="text-transform: uppercase;">
            <button onclick="joinGuest()" style="background: #555; color: #fff;">THAM GIA GUEST</button>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const GAME_CONFIG = { map: { width: 6000, height: 6000 } };
        
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let dpr = window.devicePixelRatio || 1;
        function resizeCanvas() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let myRole = ''; let myTeam = 0; let myRoom = ''; let myName = '';
        const stars = [];
        for(let i=0; i<1500; i++) stars.push({ x: Math.random()*6000, y: Math.random()*6000, size: Math.random()*2, alpha: Math.random() });

        let cam = { x: 3000, y: 3000, zoom: 0.5 };
        let isDragging = false; let dragStart = { x: 0, y: 0 };

        function clampCamera() {
            if(cam.zoom < 0.15) cam.zoom = 0.15; if(cam.zoom > 2.0) cam.zoom = 2.0;
            let viewW = window.innerWidth / cam.zoom; let viewH = window.innerHeight / cam.zoom;
            if(cam.x < viewW/2) cam.x = viewW/2; if(cam.y < viewH/2) cam.y = viewH/2;
            if(cam.x > 6000 - viewW/2) cam.x = 6000 - viewW/2; if(cam.y > 6000 - viewH/2) cam.y = 6000 - viewH/2;
        }

        canvas.addEventListener('mousedown', e => { isDragging = true; dragStart = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mousemove', e => {
            if(!isDragging) return;
            cam.x -= (e.clientX - dragStart.x) / cam.zoom; cam.y -= (e.clientY - dragStart.y) / cam.zoom;
            dragStart = { x: e.clientX, y: e.clientY }; clampCamera();
        });
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('wheel', e => { cam.zoom += e.deltaY > 0 ? -0.05 : 0.05; clampCamera(); });

        // --- NETWORK UI ---
        function showToast(msg) {
            let t = document.getElementById('system-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        function createHost() {
            myName = document.getElementById('username').value.trim() || 'Host';
            socket.emit('createRoom', myName);
        }

        function joinGuest() {
            myName = document.getElementById('username').value.trim() || 'Guest';
            let code = document.getElementById('joinCode').value.toUpperCase().trim();
            if(code) socket.emit('joinRoom', { code: code, username: myName });
        }

        socket.on('init', (data) => {
            myRole = data.role; myRoom = data.roomCode;
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('top-bar').style.display = 'flex';
            
            if(myRole === 'host') {
                showToast(`Phòng đã tạo! Mã của bạn: ${myRoom}`);
            }
        });

        socket.on('systemMsg', (msg) => { showToast(msg); });

        // --- RENDER LOOP ---
        function gameLoop() {
            ctx.fillStyle = "#030308"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(window.innerWidth/2, window.innerHeight/2);
            ctx.scale(cam.zoom, cam.zoom); ctx.translate(-cam.x, -cam.y);

            ctx.strokeStyle = "rgba(0, 255, 255, 0.2)"; ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, 6000, 6000);

            ctx.fillStyle = "white";
            let vX = cam.x - (window.innerWidth/2 / cam.zoom); let vY = cam.y - (window.innerHeight/2 / cam.zoom);
            let vW = window.innerWidth / cam.zoom; let vH = window.innerHeight / cam.zoom;

            stars.forEach(s => {
                if (s.x >= vX && s.x <= vX + vW && s.y >= vY && s.y <= vY + vH) {
                    s.alpha += (Math.random() - 0.5) * 0.05;
                    if(s.alpha < 0.2) s.alpha = 0.2; if(s.alpha > 1) s.alpha = 1;
                    ctx.globalAlpha = s.alpha; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.globalAlpha = 1.0;

            // Vẽ khối test trung tâm map để kiểm tra tọa độ
            ctx.fillStyle = "red"; ctx.fillRect(2950, 2950, 100, 100);

            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        clampCamera();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
