<!DOCTYPE html>
<html>
<head>
    <title>Web Red Alert</title>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="lobby">
        <button onclick="createRoom()">Tạo Phòng Mới</button>
        <br><br>
        <input type="text" id="roomCodeInput" placeholder="Nhập mã phòng...">
        <button onclick="joinRoom()">Tham Gia</button>
        
        <h3 id="status"></h3>
        <button id="startBtn" style="display:none;" onclick="startGame()">Bắt Đầu Game</button>
    </div>

    <canvas id="gameCanvas" style="display:none;"></canvas>

    <script>
        const socket = io();
        let myRoom = "";

        function createRoom() {
            socket.emit('createRoom');
        }

        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value;
            socket.emit('joinRoom', code);
            myRoom = code;
        }

        function startGame() {
            socket.emit('startGame', myRoom);
        }

        // Lắng nghe phản hồi từ Server
        socket.on('roomCreated', (roomCode) => {
            myRoom = roomCode;
            document.getElementById('status').innerText = "Mã phòng của bạn: " + roomCode;
            document.getElementById('startBtn').style.display = "block"; // Host mới được bấm bắt đầu
        });

        socket.on('playerJoined', (players) => {
            document.getElementById('status').innerText = "Số người trong phòng: " + players.length;
        });

        socket.on('gameStarted', (data) => {
            document.getElementById('lobby').style.display = "none";
            document.getElementById('gameCanvas').style.display = "block";
            console.log(`Game bắt đầu với ${data.humans} người chơi và ${data.ais} máy AI`);
            // Gọi hàm initGame() của bạn tại đây
        });
    </script>
</body>
</html>
