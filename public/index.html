<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RTS v0.1.5</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #255; }
    canvas { display: block; width: 100vw; height: 100vh; }
</style>
    </head>
<body>

    <div id="ui-layer" style="position: absolute; z-index: 10;">
        <div id="screen-login">
            <input type="text" id="username" placeholder="Tên của bạn">
            <button onclick="handleCreate()">TẠO PHÒNG (HOST)</button>
            <input type="text" id="joinCode" placeholder="MÃ PHÒNG">
            <button onclick="handleJoin()">THAM GIA (GUEST)</button>
        </div>
        
<div id="screen-waiting" class="screen" style="display: block;">
    <div class="panel">
        <h1 id="display-code" style="color: cyan;">----</h1>
        <ul id="player-list"></ul>
        <button id="btn-start" onclick="handleStart()" style="display:none;">BẮT ĐẦU TRÒ CHƠI</button>
    </div>
</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="network.js"></script>
    <script src="game.js"></script>
<script>
// Đảm bảo lắng nghe ở cấp độ root
socket.on('gameStarted', () => {
    console.log("SERVER ĐÃ RA LỆNH BẮT ĐẦU!");
    
    // Kiểm tra xem phần tử có tồn tại không trước khi đổi style
    let waitingScreen = document.getElementById('screen-waiting');
    let topBar = document.getElementById('top-bar');
    
    if (waitingScreen) waitingScreen.style.display = 'none';
    if (topBar) topBar.style.display = 'flex';
    
    startRendering(); // Gọi từ game.js
});

    let currentRoomCode = '';

    // Hàm gọi từ HTML
    function handleCreate() {
        const name = document.getElementById('username').value;
        Network.createRoom(name);
    }

    function handleJoin() {
        const name = document.getElementById('username').value;
        const code = document.getElementById('joinCode').value;
        Network.joinRoom(code, name);
    }

    function handleStart() {
        Network.startGame(currentRoomCode);
    }

    // Lắng nghe từ network.js
    Network.onInit((data) => {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-waiting').style.display = 'block';
        
        currentRoomCode = data.roomCode;
        document.getElementById('display-code').innerText = "MÃ PHÒNG: " + data.roomCode;

        if (data.role === 'host') {
            document.getElementById('btn-start').style.display = 'block';
        }
        
        renderPlayers(data.players);
    });

    Network.onRoomUpdate((players) => {
        renderPlayers(players);
    });

    function renderPlayers(players) {
        const list = document.getElementById('player-list');
        // socket.id được lấy từ file network.js
        list.innerHTML = players.map(p => 
            `<li>👤 ${p.name} ${p.id === socket.id ? '(Bạn)' : ''}</li>`
        ).join('');
    }
</script>

<div id="screen-waiting" style="display:none;">
    <h2 id="display-code"></h2>
    <ul id="player-list"></ul>
    <button id="btn-start" style="display:none;" onclick="handleStart()">BẮT ĐẦU TRÒ CHƠI</button>
</div>
</body>
</html>
